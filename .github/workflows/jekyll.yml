# 用于构建和部署 Jekyll 网站到 GitHub Pages 的工作流
name: Deploy Jekyll site to Pages

on:
  # 在向默认分支推送时运行
  push:
    branches: ["main"] # 注意：如果你的主分支是 "master"，请将这里改为 "master"

  # 允许你从 Actions 选项卡手动运行此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一次并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout # 步骤1：检出你的仓库代码
        uses: actions/checkout@v4
      - name: Setup Ruby # 步骤2：设置 Ruby 环境
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # 你可以根据主题要求调整 Ruby 版本
          bundler-cache: true # 关键步骤：自动运行 bundle install 并缓存依赖项
      - name: Setup Pages # 步骤3：配置 GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll # 步骤4：使用 Jekyll 构建网站
        run: bundle exec jekyll build --source ./ --destination ./_site --baseurl "${{ steps.pages.outputs.base_path }}"
      - name: Upload artifact # 步骤5：上传构建好的网站文件
        uses: actions/upload-pages-artifact@v3

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages # 步骤6：将网站文件部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4